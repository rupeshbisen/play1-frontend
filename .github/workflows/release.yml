name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run quality

      - name: Build project
        run: npm run build

      - name: Create baseline tag if none exist
        run: |
          TAG_GLOB='refs/tags/v[0-9]*.[0-9]*.[0-9]*'
          if ! git ls-remote --tags origin "$TAG_GLOB" | grep -qE '^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$'; then
            ROOT_COMMIT=$(git rev-list --max-parents=0 HEAD | tail -n 1)
            git tag v0.0.0 "$ROOT_COMMIT"
            git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }}.git"
            push_output=$(git push origin v0.0.0 2>&1) || {
              if echo "$push_output" | grep -q 'already exists'; then
                echo "Tag v0.0.0 already exists on remote, skipping."
              else
                echo "$push_output" >&2
                exit 1
              fi
            }
          fi

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
        run: npm run release
