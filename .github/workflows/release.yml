name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT (RELEASE_TOKEN) so semantic-release can push the
          # changelog commit back to the protected main branch.
          # Create a fine-grained PAT with "Contents: Read & Write" and
          # "Pull requests: Read & Write" scopes, then add it as a
          # repository secret named RELEASE_TOKEN.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run quality

      - name: Build project
        run: npm run build

      - name: Release
        env:
          # GITHUB_TOKEN is used by @semantic-release/github to create
          # the GitHub release and tag.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GIT_AUTHOR / GIT_COMMITTER are used by @semantic-release/git
          # when committing the updated CHANGELOG.md back to main.
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
        run: npm run release
